<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>凯鸽Claude 云盘 ☁️</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊️</text></svg>">
</head>
<body>

  <!-- Canvas Background -->
  <canvas id="bgCanvas"></canvas>

  <!-- Particle overlay -->
  <div id="particleOverlay"></div>

  <!-- Main Container -->
  <div class="container">

    <!-- Header -->
    <header class="header glass">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">🕊️</span>
          <span class="logo-text">
            <span class="text-kaige">凯鸽</span>
            <span class="text-claude">Claude</span>
            <span class="text-cloud">☁️</span>
          </span>
        </div>
        <div class="header-subtitle">安全 · 高速 · 智能云存储</div>
      </div>
      <div class="header-right">
        <div class="key-badge" id="keyBadge" title="点击输入密钥" onclick="focusKeyInput()">
          <span class="key-label">🔑</span>
          <span class="key-value" id="keyDisplay">未设置</span>
        </div>
        <button class="btn btn-glow btn-upload-toggle" onclick="toggleUploadPanel()">
          <span>📤</span> 上传文件
        </button>
      </div>
    </header>

    <!-- Upload Panel -->
    <div id="uploadPanel" class="upload-panel glass hidden">
      <div class="upload-panel-header">
        <h2>📤 上传文件到凯鸽云盘</h2>
        <button class="btn-close" onclick="toggleUploadPanel()">✕</button>
      </div>
      <div class="upload-form">
        <div class="form-group">
          <label>🔑 上传密钥</label>
          <input type="password" id="uploadKey" class="input-glow" placeholder="请输入上传密钥 凯鸽牛逼！">
        </div>
        <div class="form-group">
          <label>🏷️ 标签（用逗号分隔）</label>
          <input type="text" id="fileTags" class="input-glow" placeholder="例如: 照片,工作,重要">
          <div class="tag-suggestions" id="tagSuggestions"></div>
        </div>
        <div class="form-group">
          <label>📝 文件介绍</label>
          <textarea id="fileDescription" class="input-glow" rows="3" placeholder="给文件添加一段介绍..."></textarea>
        </div>
        <div class="form-group">
          <div class="drop-zone" id="dropZone">
            <div class="drop-zone-content">
              <div class="drop-icon">📁</div>
              <p class="drop-text">拖拽文件到此处 或 点击选择文件</p>
              <p class="drop-hint">支持所有文件类型 • 单文件最大 500MB</p>
            </div>
            <input type="file" id="fileInput" hidden>
          </div>
          <div id="uploadProgress" class="upload-progress hidden">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="progressText">0%</span>
          </div>
          <div id="uploadResult" class="upload-result hidden"></div>
        </div>
        <button class="btn btn-primary btn-glow btn-full" onclick="uploadFile()">
          🚀 开始上传
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

      <!-- Filter & Search Bar -->
      <div class="filter-bar glass">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="input-glow" placeholder="搜索文件名、标签或介绍..." oninput="debounceSearch()">
        </div>
        <div class="tag-filter" id="tagFilter">
          <button class="tag-btn active" data-tag="" onclick="filterByTag('')">全部</button>
        </div>
        <div class="view-options">
          <button class="view-btn active" onclick="setView('grid')" title="网格视图">⊞</button>
          <button class="view-btn" onclick="setView('list')" title="列表视图">☰</button>
        </div>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar glass" id="statsBar">
        <span>📊 共 <strong id="fileCount">0</strong> 个文件</span>
        <span>🏷️ <strong id="tagCount">0</strong> 个标签</span>
        <span>💾 总大小: <strong id="totalSize">0 B</strong></span>
      </div>

      <!-- File Grid -->
      <div class="file-grid" id="fileGrid">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🕊️</div>
          <h3>凯鸽云盘还空空的</h3>
          <p>点击右上角「上传文件」开始你的云存储之旅</p>
        </div>
      </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal hidden" onclick="closePreview(event)">
      <div class="modal-content glass" onclick="event.stopPropagation()">
        <div class="modal-header">
          <span class="modal-title" id="previewTitle">预览</span>
          <div class="modal-actions">
            <button class="btn btn-sm" id="downloadBtn" onclick="downloadCurrent()">⬇️ 下载</button>
            <button class="btn btn-sm" id="openNewTabBtn" style="display:none" onclick="openInNewTab()">🔗 新标签打开</button>
            <button class="btn-close" onclick="closePreview()">✕</button>
          </div>
        </div>
        <div class="modal-body" id="previewBody">
          <div id="previewLoading" class="preview-loading">
            <div class="spinner"></div>
            <p>加载中...</p>
          </div>
        </div>
        <div class="modal-footer" id="previewFooter">
          <span id="previewInfo"></span>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-text">
        <span>🕊️ 凯鸽Claude 云盘 v1.0</span>
        <span class="footer-divider">|</span>
        <span>用 ❤️ 和 🕊️ 打造</span>
      </div>
      <div class="footer-quote">"凯鸽万岁" — 自由飞翔，存储无限</div>
    </div>
  </footer>

  <!-- Edit Modal -->
  <div id="editModal" class="modal hidden" onclick="document.getElementById('editModal').classList.add('hidden')">
    <div class="modal-content glass edit-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span>✏️ 编辑文件信息</span>
        <button class="btn-close" onclick="document.getElementById('editModal').classList.add('hidden')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>🏷️ 标签</label>
          <input type="text" id="editTags" class="input-glow" placeholder="用逗号分隔多个标签">
        </div>
        <div class="form-group">
          <label>📝 介绍</label>
          <textarea id="editDescription" class="input-glow" rows="3" placeholder="添加介绍..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary btn-glow" onclick="saveEdit()">💾 保存</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
